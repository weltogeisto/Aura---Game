<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 4096 2048'>
<defs>
  <linearGradient id='ceilG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#e8e8e6'/>
    <stop offset='1' stop-color='#f5f5f3'/>
  </linearGradient>
  <linearGradient id='wallG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#f5f5f3'/>
    <stop offset='1' stop-color='#e8e8e4'/>
  </linearGradient>
  <linearGradient id='floorG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#d0ccc0'/>
    <stop offset='1' stop-color='#7a7870'/>
  </linearGradient>
  <radialGradient id='spotG' cx='50%' cy='50%' r='50%'>
    <stop offset='0' stop-color='#fffae0' stop-opacity='0.9'/>
    <stop offset='0.4' stop-color='#f8f0d0' stop-opacity='0.4'/>
    <stop offset='1' stop-color='#f5f5f3' stop-opacity='0'/>
  </radialGradient>
  <radialGradient id='wallSpotG' cx='50%' cy='30%' r='60%'>
    <stop offset='0' stop-color='#fff8e8' stop-opacity='0.4'/>
    <stop offset='1' stop-color='#f5f5f3' stop-opacity='0'/>
  </radialGradient>
  <pattern id='ceilPan' x='0' y='0' width='256' height='256' patternUnits='userSpaceOnUse'>
    <!-- White ceiling panel with subtle grid -->
    <rect width='256' height='256' fill='#f0f0ee'/>
    <rect x='0' y='0' width='256' height='256' fill='none' stroke='#d8d8d6' stroke-width='2'/>
    <!-- Track lighting rail channel -->
    <rect x='108' y='0' width='40' height='256' fill='#e0e0de' opacity='0.6'/>
    <rect x='114' y='0' width='28' height='256' fill='#d0d0ce' opacity='0.5'/>
  </pattern>
  <pattern id='floorPan' x='0' y='0' width='200' height='200' patternUnits='userSpaceOnUse'>
    <rect width='200' height='200' fill='#c8c4b8'/>
    <rect x='0' y='0' width='200' height='200' fill='none' stroke='#b0aca0' stroke-width='2'/>
    <rect x='2' y='2' width='96' height='96' fill='#d0ccc0' opacity='0.6'/>
    <rect x='102' y='2' width='96' height='96' fill='#c0bcb0' opacity='0.6'/>
    <rect x='2' y='102' width='96' height='96' fill='#c0bcb0' opacity='0.6'/>
    <rect x='102' y='102' width='96' height='96' fill='#d0ccc0' opacity='0.6'/>
  </pattern>
</defs>
<!-- CEILING y=0-580 -->
<rect width='4096' height='580' fill='url(#ceilG)'/>
<!-- Clean white ceiling panels with track lines -->
<rect width='4096' height='560' fill='url(#ceilPan)' opacity='0.95'/>
<!-- Track lighting rails (long horizontal channels) -->
<g fill='#c8c8c6' opacity='0.8'>
  <rect x='0' y='300' width='4096' height='14'/>
  <rect x='0' y='380' width='4096' height='14'/>
  <rect x='0' y='460' width='4096' height='14'/>
</g>
<!-- Track lights as small circles/ellipses along rails -->
<g fill='#e0dcd0' opacity='0.85'>
  <ellipse cx='150' cy='307' rx='12' ry='8'/><ellipse cx='350' cy='307' rx='12' ry='8'/>
  <ellipse cx='550' cy='307' rx='12' ry='8'/><ellipse cx='750' cy='307' rx='12' ry='8'/>
  <ellipse cx='950' cy='307' rx='12' ry='8'/><ellipse cx='1150' cy='307' rx='12' ry='8'/>
  <ellipse cx='1350' cy='307' rx='12' ry='8'/><ellipse cx='1550' cy='307' rx='12' ry='8'/>
  <ellipse cx='1750' cy='307' rx='12' ry='8'/><ellipse cx='1950' cy='307' rx='12' ry='8'/>
  <ellipse cx='2150' cy='307' rx='12' ry='8'/><ellipse cx='2350' cy='307' rx='12' ry='8'/>
  <ellipse cx='2550' cy='307' rx='12' ry='8'/><ellipse cx='2750' cy='307' rx='12' ry='8'/>
  <ellipse cx='2950' cy='307' rx='12' ry='8'/><ellipse cx='3150' cy='307' rx='12' ry='8'/>
  <ellipse cx='3350' cy='307' rx='12' ry='8'/><ellipse cx='3550' cy='307' rx='12' ry='8'/>
  <ellipse cx='3750' cy='307' rx='12' ry='8'/><ellipse cx='3950' cy='307' rx='12' ry='8'/>
</g>
<!-- Track light glow cones downward -->
<g fill='url(#spotG)' opacity='0.35'>
  <ellipse cx='150' cy='500' rx='90' ry='50'/>
  <ellipse cx='550' cy='500' rx='90' ry='50'/>
  <ellipse cx='950' cy='500' rx='90' ry='50'/>
  <ellipse cx='1350' cy='500' rx='90' ry='50'/>
  <ellipse cx='1750' cy='500' rx='90' ry='50'/>
  <ellipse cx='2150' cy='500' rx='90' ry='50'/>
  <ellipse cx='2550' cy='500' rx='90' ry='50'/>
  <ellipse cx='2950' cy='500' rx='90' ry='50'/>
  <ellipse cx='3350' cy='500' rx='90' ry='50'/>
  <ellipse cx='3750' cy='500' rx='90' ry='50'/>
</g>
<!-- Track light bulb dots -->
<g fill='#fffae0' opacity='0.9'>
  <circle cx='150' cy='307' r='5'/><circle cx='350' cy='307' r='5'/>
  <circle cx='550' cy='307' r='5'/><circle cx='750' cy='307' r='5'/>
  <circle cx='950' cy='307' r='5'/><circle cx='1150' cy='307' r='5'/>
  <circle cx='1350' cy='307' r='5'/><circle cx='1550' cy='307' r='5'/>
  <circle cx='1750' cy='307' r='5'/><circle cx='1950' cy='307' r='5'/>
  <circle cx='2150' cy='307' r='5'/><circle cx='2350' cy='307' r='5'/>
  <circle cx='2550' cy='307' r='5'/><circle cx='2750' cy='307' r='5'/>
  <circle cx='2950' cy='307' r='5'/><circle cx='3150' cy='307' r='5'/>
  <circle cx='3350' cy='307' r='5'/><circle cx='3550' cy='307' r='5'/>
  <circle cx='3750' cy='307' r='5'/><circle cx='3950' cy='307' r='5'/>
</g>
<!-- Ceiling ambient fill glow -->
<rect width='4096' height='580' fill='#f0f0ee' opacity='0.04'/>
<!-- WALL-CEILING JOIN y=548-645 (very clean minimal) -->
<rect y='548' width='4096' height='100' fill='#ececea'/>
<rect y='548' width='4096' height='3' fill='#d0d0ce' opacity='0.8'/>
<rect y='645' width='4096' height='3' fill='#d8d8d6' opacity='0.6'/>
<!-- WALLS y=640-1400 -->
<rect y='640' width='4096' height='760' fill='url(#wallG)'/>
<!-- Very subtle wall panel grid (minimal) -->
<g stroke='#e0e0de' stroke-width='1.5' opacity='0.6' fill='none'>
  <line x1='0' y1='680' x2='4096' y2='680'/>
  <line x1='0' y1='1360' x2='4096' y2='1360'/>
</g>
<!-- Artwork spot lighting on walls (downward cones from track to wall) -->
<g fill='url(#wallSpotG)' opacity='0.5'>
  <ellipse cx='250' cy='900' rx='150' ry='200'/>
  <ellipse cx='750' cy='900' rx='150' ry='200'/>
  <ellipse cx='1250' cy='900' rx='150' ry='200'/>
  <ellipse cx='1750' cy='900' rx='150' ry='200'/>
  <ellipse cx='2250' cy='900' rx='150' ry='200'/>
  <ellipse cx='2750' cy='900' rx='150' ry='200'/>
  <ellipse cx='3250' cy='900' rx='150' ry='200'/>
  <ellipse cx='3750' cy='900' rx='150' ry='200'/>
</g>
<!-- Artwork placeholder frames (minimal thin black lines) -->
<g fill='none' stroke='#c0c0be' stroke-width='3'>
  <rect x='100' y='720' width='260' height='340'/>
  <rect x='580' y='760' width='200' height='280'/>
  <rect x='1060' y='700' width='300' height='380'/>
  <rect x='1580' y='740' width='240' height='300'/>
  <rect x='2060' y='720' width='260' height='340'/>
  <rect x='2540' y='760' width='220' height='280'/>
  <rect x='3020' y='700' width='300' height='360'/>
  <rect x='3540' y='740' width='240' height='300'/>
</g>
<!-- White canvas fill inside frames -->
<g fill='#f0ece6' opacity='0.8'>
  <rect x='103' y='723' width='254' height='334'/>
  <rect x='583' y='763' width='194' height='274'/>
  <rect x='1063' y='703' width='294' height='374'/>
  <rect x='1583' y='743' width='234' height='294'/>
  <rect x='2063' y='723' width='254' height='334'/>
  <rect x='2543' y='763' width='214' height='274'/>
  <rect x='3023' y='703' width='294' height='354'/>
  <rect x='3543' y='743' width='234' height='294'/>
</g>
<!-- Baseboard thin strip -->
<rect y='1386' width='4096' height='22' fill='#d8d8d4'/>
<rect y='1384' width='4096' height='4' fill='#c0c0be' opacity='0.6'/>
<!-- FLOOR y=1400-2048 — polished concrete -->
<rect y='1400' width='4096' height='648' fill='url(#floorG)'/>
<rect y='1400' width='4096' height='648' fill='url(#floorPan)' opacity='0.82'/>
<!-- Floor polish sheen / slight reflection of walls -->
<rect y='1400' width='4096' height='120' fill='#f5f5f3' opacity='0.07'/>
<!-- Floor subtle shadow at base of walls -->
<rect y='1400' width='4096' height='30' fill='#d0ccc0' opacity='0.1'/>
<!-- Floor vignette -->
<rect y='1820' width='4096' height='228' fill='#5a5850' opacity='0.4'/>
</svg>
