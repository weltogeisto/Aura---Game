  <rect x='180' y='640' width='90' height='760' fill='url(#colG)' opacity='0.88'/>
  <rect x='540' y='640' width='90' height='760' fill='url(#colG)'/><rect x='630' y='640' width='90' height='760' fill='url(#colG)' opacity='0.88'/>
