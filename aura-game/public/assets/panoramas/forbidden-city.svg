<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 4096 2048'>
<defs>
  <linearGradient id='ceilG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#050202'/>
    <stop offset='0.3' stop-color='#1a0808'/>
    <stop offset='1' stop-color='#c87820'/>
  </linearGradient>
  <linearGradient id='wallG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#c01010'/>
    <stop offset='0.5' stop-color='#990000'/>
    <stop offset='1' stop-color='#5a0000'/>
  </linearGradient>
  <linearGradient id='floorG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#c0b890'/>
    <stop offset='0.4' stop-color='#806840'/>
    <stop offset='1' stop-color='#180808'/>
  </linearGradient>
  <linearGradient id='colG' x1='0' y1='0' x2='1' y2='0'>
    <stop offset='0' stop-color='#7a0000'/>
    <stop offset='0.2' stop-color='#cc1010'/>
    <stop offset='0.5' stop-color='#ee2020'/>
    <stop offset='0.8' stop-color='#cc1010'/>
    <stop offset='1' stop-color='#7a0000'/>
  </linearGradient>
  <radialGradient id='dragonGlow' cx='50%' cy='30%' r='55%'>
    <stop offset='0' stop-color='#f0d840' stop-opacity='0.45'/>
    <stop offset='0.5' stop-color='#c87820' stop-opacity='0.2'/>
    <stop offset='1' stop-color='#990000' stop-opacity='0'/>
  </radialGradient>
  <pattern id='dragonCeil' x='0' y='0' width='400' height='300' patternUnits='userSpaceOnUse'>
    <rect width='400' height='300' fill='#c87820'/>
    <rect x='6' y='6' width='388' height='288' fill='#a86010' rx='4'/>
    <rect x='16' y='16' width='368' height='268' fill='#c87820' rx='2'/>
    <!-- Stylized dragon cloud panel -->
    <ellipse cx='200' cy='150' rx='100' ry='70' fill='#e8a020' opacity='0.4'/>
    <path d='M100,120 q30,-40 60,-20 q20,-30 40,0 q20,-30 60,-10 q30,-40 60,10 q20,0 30,30' fill='none' stroke='#f0c830' stroke-width='3' opacity='0.6'/>
    <path d='M100,180 q30,40 60,20 q20,30 40,0 q20,30 60,10 q30,40 60,-10 q20,0 30,-30' fill='none' stroke='#f0c830' stroke-width='3' opacity='0.6'/>
    <circle cx='200' cy='150' r='22' fill='#f5d840' opacity='0.5'/>
    <circle cx='200' cy='150' r='10' fill='#fffae0' opacity='0.4'/>
    <!-- Corner bracket clouds -->
    <path d='M0,0 q30,0 30,30 q0,30 30,30' fill='none' stroke='#f0c830' stroke-width='2' opacity='0.5'/>
    <path d='M400,0 q-30,0 -30,30 q0,30 -30,30' fill='none' stroke='#f0c830' stroke-width='2' opacity='0.5'/>
    <path d='M0,300 q30,0 30,-30 q0,-30 30,-30' fill='none' stroke='#f0c830' stroke-width='2' opacity='0.5'/>
    <path d='M400,300 q-30,0 -30,-30 q0,-30 -30,-30' fill='none' stroke='#f0c830' stroke-width='2' opacity='0.5'/>
  </pattern>
  <pattern id='stoneTerrace' x='0' y='0' width='200' height='100' patternUnits='userSpaceOnUse'>
    <rect width='200' height='100' fill='#b0a888'/>
    <rect x='0' y='0' width='200' height='100' fill='none' stroke='#989070' stroke-width='3'/>
    <rect x='5' y='5' width='90' height='40' fill='#c0b898' stroke='#909070' stroke-width='1'/>
    <rect x='100' y='5' width='95' height='40' fill='#b8b090' stroke='#909070' stroke-width='1'/>
    <rect x='5' y='55' width='90' height='40' fill='#b8b090' stroke='#909070' stroke-width='1'/>
    <rect x='100' y='55' width='95' height='40' fill='#c0b898' stroke='#909070' stroke-width='1'/>
  </pattern>
</defs>
<!-- CEILING y=0-580 -->
<rect width='4096' height='580' fill='url(#ceilG)'/>
<!-- Dragon-cloud ceiling panels -->
<rect width='4096' height='550' fill='url(#dragonCeil)' opacity='0.85'/>
<!-- Dragon glow emanating from ceiling center -->
<ellipse cx='2048' cy='180' rx='600' ry='280' fill='url(#dragonGlow)'/>
<!-- Top dark void -->
<rect width='4096' height='60' fill='#020101' opacity='0.75'/>
<!-- Ceiling beam grid in gold -->
<g stroke='#c87820' stroke-width='8' opacity='0.55' fill='none'>
  <line x1='0' y1='130' x2='4096' y2='130'/>
  <line x1='0' y1='260' x2='4096' y2='260'/>
  <line x1='0' y1='390' x2='4096' y2='390'/>
  <line x1='0' y1='520' x2='4096' y2='520'/>
</g>
<g stroke='#c87820' stroke-width='8' opacity='0.45' fill='none'>
