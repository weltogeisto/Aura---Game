<!-- FLOOR y=1400-2048 — marble terrace with stone slabs -->
<rect y='1400' width='4096' height='648' fill='url(#floorG)'/>
<rect y='1400' width='4096' height='500' fill='url(#stoneTerrace)' opacity='0.75'/>
<!-- Marble terrace steps at floor level -->
