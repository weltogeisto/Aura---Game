  <line x1='3200' y1='0' x2='3200' y2='580'/>
  <line x1='3600' y1='0' x2='3600' y2='580'/>
</g>
<!-- CORNICE / bracketing y=548-645 -->
<rect y='548' width='4096' height='100' fill='#c87820'/>
<rect y='548' width='4096' height='12' fill='#f5e070' opacity='0.9'/>
<rect y='628' width='4096' height='12' fill='#8a5000' opacity='0.9'/>
