<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 4096 2048'>
<defs>
  <linearGradient id='ceilG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#0a1220'/>
    <stop offset='0.4' stop-color='#1e3060'/>
    <stop offset='1' stop-color='#c8922a'/>
  </linearGradient>
  <linearGradient id='wallG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#e8e0d0'/>
    <stop offset='0.5' stop-color='#d8d0c0'/>
    <stop offset='1' stop-color='#a89878'/>
  </linearGradient>
  <linearGradient id='floorG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#9a7040'/>
    <stop offset='1' stop-color='#1a0e04'/>
  </linearGradient>
  <linearGradient id='drapeG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#1e3060'/>
    <stop offset='0.5' stop-color='#2a4878'/>
    <stop offset='1' stop-color='#0e1838'/>
  </linearGradient>
  <linearGradient id='panelG' x1='0' y1='0' x2='1' y2='0'>
    <stop offset='0' stop-color='#e0d8c8'/>
    <stop offset='0.5' stop-color='#f0e8d8'/>
    <stop offset='1' stop-color='#c8c0b0'/>
  </linearGradient>
  <radialGradient id='medallG' cx='50%' cy='50%' r='50%'>
    <stop offset='0' stop-color='#fff8d0' stop-opacity='0.6'/>
    <stop offset='0.4' stop-color='#f0d060' stop-opacity='0.3'/>
    <stop offset='1' stop-color='#c8922a' stop-opacity='0'/>
  </radialGradient>
  <pattern id='ceilOrn' x='0' y='0' width='300' height='220' patternUnits='userSpaceOnUse'>
    <rect width='300' height='220' fill='#1e3060'/>
    <rect x='6' y='6' width='288' height='208' fill='#2a4878' rx='5'/>
    <rect x='18' y='18' width='264' height='184' fill='#1e3060' rx='3'/>
    <!-- Painted oval medallion in center -->
    <ellipse cx='150' cy='110' rx='80' ry='60' fill='#b8d0f0' opacity='0.25'/>
    <ellipse cx='150' cy='110' rx='60' ry='42' fill='#e8d0a0' opacity='0.18'/>
    <!-- Gold frame -->
    <ellipse cx='150' cy='110' rx='82' ry='62' fill='none' stroke='#c8922a' stroke-width='5'/>
    <ellipse cx='150' cy='110' rx='78' ry='58' fill='none' stroke='#e8d080' stroke-width='2'/>
    <!-- Corner cartouches -->
    <circle cx='20' cy='20' r='12' fill='#c8922a' opacity='0.5'/>
    <circle cx='280' cy='20' r='12' fill='#c8922a' opacity='0.5'/>
    <circle cx='20' cy='200' r='12' fill='#c8922a' opacity='0.5'/>
    <circle cx='280' cy='200' r='12' fill='#c8922a' opacity='0.5'/>
  </pattern>
  <pattern id='herring' x='0' y='0' width='80' height='40' patternUnits='userSpaceOnUse'>
    <rect width='80' height='40' fill='#8a6038'/>
    <polygon points='0,0 40,0 40,20' fill='#aa8050' opacity='0.8'/>
    <polygon points='40,0 80,0 80,20 40,20' fill='#6a4020' opacity='0.8'/>
    <polygon points='0,20 40,20 40,40' fill='#6a4020' opacity='0.8'/>
    <polygon points='40,20 80,20 80,40 40,40' fill='#aa8050' opacity='0.8'/>
    <line x1='0' y1='0' x2='80' y2='40' stroke='#4a2810' stroke-width='1.5' opacity='0.5'/>
    <line x1='80' y1='0' x2='0' y2='40' stroke='#4a2810' stroke-width='1.5' opacity='0.5'/>
  </pattern>
</defs>
<!-- CEILING y=0-580 -->
<rect width='4096' height='580' fill='url(#ceilG)'/>
<!-- Ornate painted ceiling panels -->
<rect width='4096' height='550' fill='url(#ceilOrn)' opacity='0.85'/>
<!-- Top shadow -->
<rect width='4096' height='70' fill='#060810' opacity='0.7'/>
<!-- Central painted medallion glow -->
<ellipse cx='2048' cy='240' rx='400' ry='260' fill='url(#medallG)'/>
<ellipse cx='2048' cy='240' rx='160' ry='110' fill='#fffae8' opacity='0.18'/>
<!-- Chandelier glow points -->
<g fill='url(#medallG)' opacity='0.7'>
