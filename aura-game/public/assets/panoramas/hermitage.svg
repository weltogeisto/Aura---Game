  <rect x='2292' y='660' width='330' height='680' fill='none' stroke='#c8922a' stroke-width='6'/>
  <rect x='2364' y='660' width='180' height='600' fill='#fff8e0' opacity='0.12' rx='90'/>

  <rect x='2672' y='660' width='330' height='680' fill='url(#drapeG)' opacity='0.85'/>
