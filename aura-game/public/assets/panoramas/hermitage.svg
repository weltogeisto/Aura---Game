<rect y='548' width='4096' height='12' fill='#f0e0a0' opacity='0.9'/>
<rect y='628' width='4096' height='12' fill='#9a6810' opacity='0.9'/>
<!-- Ornate cornice detail -->
<g fill='#d4a030' opacity='0.7'>
  <rect x='0' y='562' width='4096' height='5' fill='none' stroke='#e8d080' stroke-width='3' stroke-dasharray='30 10'/>
  <rect x='0' y='580' width='4096' height='5' fill='none' stroke='#c8922a' stroke-width='2' stroke-dasharray='15 15'/>
</g>
