<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 4096 2048'>
<defs>
  <linearGradient id='ceilG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#1a1008'/>
    <stop offset='0.5' stop-color='#b07820'/>
    <stop offset='1' stop-color='#d4a840'/>
  </linearGradient>
  <linearGradient id='wallG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#8a2840'/>
    <stop offset='0.5' stop-color='#7a2838'/>
    <stop offset='1' stop-color='#4a1020'/>
  </linearGradient>
  <linearGradient id='floorG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#9a6830'/>
    <stop offset='1' stop-color='#2a1008'/>
  </linearGradient>
  <linearGradient id='winG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#fff8d0' stop-opacity='0.98'/>
    <stop offset='0.6' stop-color='#f0c860' stop-opacity='0.7'/>
    <stop offset='1' stop-color='#c8922a' stop-opacity='0.15'/>
  </linearGradient>
  <linearGradient id='corniceG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#e8d080'/>
    <stop offset='0.5' stop-color='#c8922a'/>
    <stop offset='1' stop-color='#8a5810'/>
  </linearGradient>
  <radialGradient id='chandG' cx='50%' cy='50%' r='50%'>
    <stop offset='0' stop-color='#fffae8' stop-opacity='0.9'/>
    <stop offset='0.4' stop-color='#f5d870' stop-opacity='0.5'/>
    <stop offset='1' stop-color='#c8922a' stop-opacity='0'/>
  </radialGradient>
  <pattern id='coffer' x='0' y='0' width='256' height='200' patternUnits='userSpaceOnUse'>
    <rect width='256' height='200' fill='#9a6810'/>
    <rect x='6' y='6' width='244' height='188' fill='#c89030' rx='3'/>
    <rect x='16' y='16' width='224' height='168' fill='#b07820' rx='2'/>
    <rect x='26' y='26' width='204' height='148' fill='#c89830' rx='1'/>
    <circle cx='128' cy='100' r='28' fill='#e8c060' opacity='0.75'/>
    <circle cx='128' cy='100' r='16' fill='#fff8cc' opacity='0.6'/>
    <rect x='110' y='6' width='36' height='188' fill='#9a6810' opacity='0.35'/>
    <rect x='6' y='90' width='244' height='20' fill='#9a6810' opacity='0.35'/>
  </pattern>
  <pattern id='herring' x='0' y='0' width='80' height='40' patternUnits='userSpaceOnUse'>
    <rect width='80' height='40' fill='#8b5e2a'/>
    <polygon points='0,0 40,0 40,20' fill='#a87038' opacity='0.8'/>
    <polygon points='40,0 80,0 80,20 40,20' fill='#6a4010' opacity='0.8'/>
    <polygon points='0,20 40,20 40,40' fill='#6a4010' opacity='0.8'/>
    <polygon points='40,20 80,20 80,40 40,40' fill='#a87038' opacity='0.8'/>
    <line x1='0' y1='0' x2='80' y2='40' stroke='#4a2808' stroke-width='1.5' opacity='0.5'/>
    <line x1='80' y1='0' x2='0' y2='40' stroke='#4a2808' stroke-width='1.5' opacity='0.5'/>
  </pattern>
</defs>
<!-- CEILING y=0-580 -->
<rect width='4096' height='580' fill='url(#ceilG)'/>
<rect width='4096' height='580' fill='url(#coffer)' opacity='0.88'/>
<!-- Ceiling shadow vignette -->
<rect width='4096' height='100' fill='#0a0800' opacity='0.6'/>
