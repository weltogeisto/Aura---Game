<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 4096 2048'>
<defs>
  <linearGradient id='ceilG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#3a3e3c'/>
    <stop offset='1' stop-color='#586058'/>
  </linearGradient>
  <linearGradient id='wallG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#6a7868'/>
    <stop offset='0.5' stop-color='#5a6858'/>
    <stop offset='1' stop-color='#3a4838'/>
  </linearGradient>
  <linearGradient id='floorG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#9a8840'/>
    <stop offset='0.3' stop-color='#7a7030'/>
    <stop offset='1' stop-color='#1a1808'/>
  </linearGradient>
  <linearGradient id='vaultDoorG' cx='50%' cy='50%' r='50%' x1='0' y1='0' x2='1' y2='1'>
    <stop offset='0' stop-color='#7a8090'/>
    <stop offset='0.5' stop-color='#5a6068'/>
    <stop offset='1' stop-color='#3a4048'/>
  </linearGradient>
  <radialGradient id='fluoR' cx='50%' cy='50%' r='50%'>
    <stop offset='0' stop-color='#e8f0d8' stop-opacity='0.8'/>
    <stop offset='0.5' stop-color='#b8c8a8' stop-opacity='0.3'/>
    <stop offset='1' stop-color='#6a7868' stop-opacity='0'/>
  </radialGradient>
  <radialGradient id='goldRefl' cx='50%' cy='0%' r='80%'>
    <stop offset='0' stop-color='#c8a828' stop-opacity='0.35'/>
    <stop offset='1' stop-color='#9a8030' stop-opacity='0'/>
  </radialGradient>
  <pattern id='concreteCeil' x='0' y='0' width='300' height='200' patternUnits='userSpaceOnUse'>
    <rect width='300' height='200' fill='#4a5250'/>
    <!-- Concrete panel joints -->
    <rect x='0' y='0' width='300' height='200' fill='none' stroke='#3a4240' stroke-width='4'/>
    <!-- Fluorescent fixture recessed -->
    <rect x='20' y='20' width='260' height='60' fill='#5a6260' rx='2'/>
    <rect x='25' y='25' width='250' height='50' fill='#c8d8c0' opacity='0.4' rx='1'/>
    <!-- Bolt details -->
    <circle cx='15' cy='15' r='5' fill='#3a4040'/>
    <circle cx='285' cy='15' r='5' fill='#3a4040'/>
    <circle cx='15' cy='185' r='5' fill='#3a4040'/>
    <circle cx='285' cy='185' r='5' fill='#3a4040'/>
  </pattern>
  <pattern id='concreteWall' x='0' y='0' width='200' height='150' patternUnits='userSpaceOnUse'>
    <rect width='200' height='150' fill='#5a6858'/>
    <rect x='0' y='0' width='200' height='150' fill='none' stroke='#4a5848' stroke-width='3'/>
    <!-- Steel reinforcing rib texture -->
    <line x1='0' y1='75' x2='200' y2='75' stroke='#4a5848' stroke-width='6' opacity='0.6'/>
    <line x1='100' y1='0' x2='100' y2='150' stroke='#4a5848' stroke-width='4' opacity='0.4'/>
  </pattern>
  <pattern id='goldFloor' x='0' y='0' width='120' height='120' patternUnits='userSpaceOnUse'>
    <rect width='120' height='120' fill='#9a8840'/>
    <rect x='0' y='0' width='120' height='120' fill='none' stroke='#7a6820' stroke-width='2'/>
    <rect x='5' y='5' width='110' height='110' fill='#a89040' opacity='0.5'/>
    <rect x='15' y='15' width='90' height='90' fill='#c8a828' opacity='0.15'/>
  </pattern>
</defs>
<!-- CEILING y=0-580 -->
<rect width='4096' height='580' fill='url(#ceilG)'/>
<!-- Concrete ceiling panels -->
<rect width='4096' height='560' fill='url(#concreteCeil)' opacity='0.88'/>
<!-- Top shadow -->
<rect width='4096' height='60' fill='#1a1e1c' opacity='0.7'/>
<!-- Industrial fluorescent glow halos -->
<g fill='url(#fluoR)' opacity='0.55'>
  <ellipse cx='300' cy='260' rx='200' ry='60'/>
  <ellipse cx='900' cy='260' rx='200' ry='60'/>
  <ellipse cx='1500' cy='260' rx='200' ry='60'/>
