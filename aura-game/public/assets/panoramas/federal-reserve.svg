    <line x1='3376' y1='1000' x2='3616' y2='1000'/><line x1='3616' y1='1000' x2='3856' y2='1000'/>
    <line x1='3449' y1='833' x2='3616' y2='1000'/><line x1='3616' y1='1000' x2='3783' y2='1167'/>
