<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 4096 2048'>
<defs>
  <linearGradient id='ceilG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#c8d4dc'/>
    <stop offset='1' stop-color='#e8eef2'/>
  </linearGradient>
  <linearGradient id='wallG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#d8e0e8'/>
    <stop offset='1' stop-color='#a8b8c8'/>
  </linearGradient>
  <linearGradient id='floorG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#d0d8dc'/>
    <stop offset='1' stop-color='#606870'/>
  </linearGradient>
  <linearGradient id='panelG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#7a8894'/>
    <stop offset='1' stop-color='#5a6870'/>
  </linearGradient>
  <radialGradient id='fluoG' cx='50%' cy='50%' r='50%'>
    <stop offset='0' stop-color='#fffef8' stop-opacity='1'/>
    <stop offset='0.5' stop-color='#e8f0f8' stop-opacity='0.8'/>
    <stop offset='1' stop-color='#a0c0d8' stop-opacity='0'/>
  </radialGradient>
  <pattern id='ceilGrid' x='0' y='0' width='256' height='128' patternUnits='userSpaceOnUse'>
    <!-- Suspended ceiling panel -->
    <rect width='256' height='128' fill='#dce8f0'/>
    <!-- Panel border (T-bar) -->
    <rect x='0' y='0' width='256' height='128' fill='none' stroke='#9aacb8' stroke-width='5'/>
    <!-- Fluorescent tube panel (every other column) -->
    <rect x='10' y='10' width='236' height='108' fill='#e8f2f8' rx='2'/>
    <rect x='20' y='20' width='216' height='88' fill='#f0f8ff' opacity='0.9' rx='1'/>
  </pattern>
  <pattern id='floorGrid' x='0' y='0' width='160' height='160' patternUnits='userSpaceOnUse'>
    <rect width='160' height='160' fill='#c0ccd4'/>
    <rect x='0' y='0' width='160' height='160' fill='none' stroke='#8a9aa4' stroke-width='2'/>
    <rect x='10' y='10' width='140' height='140' fill='none' stroke='#9aaab4' stroke-width='0.5'/>
  </pattern>
  <pattern id='equipPanel' x='0' y='0' width='320' height='400' patternUnits='userSpaceOnUse'>
    <rect width='320' height='400' fill='#6a7880'/>
    <rect x='8' y='8' width='304' height='384' fill='#7a8898' rx='3'/>
    <!-- Status lights row -->
    <circle cx='30' cy='30' r='8' fill='#00c840' opacity='0.9'/>
    <circle cx='55' cy='30' r='8' fill='#e8c820' opacity='0.9'/>
    <circle cx='80' cy='30' r='8' fill='#c83020' opacity='0.7'/>
    <!-- Display panel -->
    <rect x='20' y='55' width='200' height='120' fill='#1a2830' rx='2'/>
    <rect x='25' y='60' width='190' height='110' fill='#0a1820' rx='1'/>
    <g stroke='#00c8a0' stroke-width='1' opacity='0.7' fill='none'>
      <line x1='25' y1='90' x2='215' y2='90'/>
      <line x1='25' y1='110' x2='215' y2='110'/>
      <line x1='25' y1='130' x2='215' y2='130'/>
      <line x1='25' y1='150' x2='215' y2='150'/>
    </g>
    <!-- Buttons row -->
    <rect x='20' y='190' width='280' height='18' fill='#5a6870' rx='2'/>
    <g fill='#8ab0c8'>
      <rect x='25' y='193' width='24' height='12' rx='2'/><rect x='54' y='193' width='24' height='12' rx='2'/>
      <rect x='83' y='193' width='24' height='12' rx='2'/><rect x='112' y='193' width='24' height='12' rx='2'/>
      <rect x='141' y='193' width='24' height='12' rx='2'/>
    </g>
    <!-- Vent grille -->
    <g stroke='#9ab0c0' stroke-width='1' opacity='0.5'>
      <line x1='20' y1='230' x2='300' y2='230'/><line x1='20' y1='240' x2='300' y2='240'/>
      <line x1='20' y1='250' x2='300' y2='250'/><line x1='20' y1='260' x2='300' y2='260'/>
      <line x1='20' y1='270' x2='300' y2='270'/><line x1='20' y1='280' x2='300' y2='280'/>
    </g>
    <!-- Warning stripe bottom -->
    <rect x='0' y='360' width='320' height='40' fill='none' stroke='#e8c820' stroke-width='0'/>
    <g opacity='0.8'>
      <rect x='0' y='360' width='40' height='40' fill='#e8c820'/>
      <rect x='80' y='360' width='40' height='40' fill='#e8c820'/>
      <rect x='160' y='360' width='40' height='40' fill='#e8c820'/>
      <rect x='240' y='360' width='40' height='40' fill='#e8c820'/>
      <rect x='40' y='360' width='40' height='40' fill='#1a1e22'/>
      <rect x='120' y='360' width='40' height='40' fill='#1a1e22'/>
      <rect x='200' y='360' width='40' height='40' fill='#1a1e22'/>
      <rect x='280' y='360' width='40' height='40' fill='#1a1e22'/>
    </g>
  </pattern>
</defs>
<!-- CEILING y=0-580 -->
<rect width='4096' height='580' fill='url(#ceilG)'/>
<!-- Suspended ceiling grid panels -->
<rect width='4096' height='540' fill='url(#ceilGrid)' opacity='0.9'/>
<!-- Fluorescent light glow panels -->
<g fill='url(#fluoG)' opacity='0.6'>
  <ellipse cx='256' cy='240' rx='160' ry='60'/>
  <ellipse cx='768' cy='240' rx='160' ry='60'/>
  <ellipse cx='1280' cy='240' rx='160' ry='60'/>
  <ellipse cx='1792' cy='240' rx='160' ry='60'/>
  <ellipse cx='2304' cy='240' rx='160' ry='60'/>
  <ellipse cx='2816' cy='240' rx='160' ry='60'/>
  <ellipse cx='3328' cy='240' rx='160' ry='60'/>
  <ellipse cx='3840' cy='240' rx='160' ry='60'/>
</g>
<!-- Light tube highlights -->
<g fill='#fffef8' opacity='0.85'>
  <rect x='176' y='200' width='160' height='10' rx='5'/>
  <rect x='688' y='200' width='160' height='10' rx='5'/>
  <rect x='1200' y='200' width='160' height='10' rx='5'/>
  <rect x='1712' y='200' width='160' height='10' rx='5'/>
  <rect x='2224' y='200' width='160' height='10' rx='5'/>
  <rect x='2736' y='200' width='160' height='10' rx='5'/>
  <rect x='3248' y='200' width='160' height='10' rx='5'/>
  <rect x='3760' y='200' width='160' height='10' rx='5'/>
</g>
<!-- Ceiling diffuse glow overall -->
<rect width='4096' height='580' fill='#b0d0e8' opacity='0.06'/>
<!-- CORNICE / ceiling-wall join y=548-640 -->
<rect y='548' width='4096' height='92' fill='#7a8894'/>
<rect y='548' width='4096' height='6' fill='#a0b8c8' opacity='0.8'/>
<rect y='634' width='4096' height='6' fill='#5a6870' opacity='0.9'/>
<!-- HEPA filter bank stripe at top of wall -->
<g fill='#8a9aaa' opacity='0.6'>
  <rect x='0' y='556' width='4096' height='4' fill='none' stroke='#c0d0d8' stroke-width='2' stroke-dasharray='30 10'/>
</g>
<!-- WALLS y=640-1400 -->
<rect y='640' width='4096' height='760' fill='url(#wallG)'/>
<!-- Equipment panels tiled on walls -->
<rect y='640' width='4096' height='700' fill='url(#equipPanel)' opacity='0.75'/>
<!-- Warning stripe band at mid-wall -->
<g>
  <rect y='1150' width='4096' height='50' fill='#1a1e22'/>
  <g fill='#e8c820' opacity='0.9'>
    <rect x='0' y='1150' width='60' height='50'/>
    <rect x='120' y='1150' width='60' height='50'/>
    <rect x='240' y='1150' width='60' height='50'/>
    <rect x='360' y='1150' width='60' height='50'/>
    <rect x='480' y='1150' width='60' height='50'/>
    <rect x='600' y='1150' width='60' height='50'/>
    <rect x='720' y='1150' width='60' height='50'/>
    <rect x='840' y='1150' width='60' height='50'/>
    <rect x='960' y='1150' width='60' height='50'/>
    <rect x='1080' y='1150' width='60' height='50'/>
    <rect x='1200' y='1150' width='60' height='50'/>
    <rect x='1320' y='1150' width='60' height='50'/>
    <rect x='1440' y='1150' width='60' height='50'/>
    <rect x='1560' y='1150' width='60' height='50'/>
    <rect x='1680' y='1150' width='60' height='50'/>
    <rect x='1800' y='1150' width='60' height='50'/>
    <rect x='1920' y='1150' width='60' height='50'/>
    <rect x='2040' y='1150' width='60' height='50'/>
    <rect x='2160' y='1150' width='60' height='50'/>
    <rect x='2280' y='1150' width='60' height='50'/>
    <rect x='2400' y='1150' width='60' height='50'/>
    <rect x='2520' y='1150' width='60' height='50'/>
    <rect x='2640' y='1150' width='60' height='50'/>
    <rect x='2760' y='1150' width='60' height='50'/>
    <rect x='2880' y='1150' width='60' height='50'/>
    <rect x='3000' y='1150' width='60' height='50'/>
    <rect x='3120' y='1150' width='60' height='50'/>
    <rect x='3240' y='1150' width='60' height='50'/>
    <rect x='3360' y='1150' width='60' height='50'/>
    <rect x='3480' y='1150' width='60' height='50'/>
    <rect x='3600' y='1150' width='60' height='50'/>
    <rect x='3720' y='1150' width='60' height='50'/>
    <rect x='3840' y='1150' width='60' height='50'/>
    <rect x='3960' y='1150' width='60' height='50'/>
  </g>
</g>
<!-- Lower wall equipment (conduit / pipe runs) -->
<rect y='1210' width='4096' height='18' fill='#5a6870' opacity='0.7'/>
<g stroke='#8a9898' stroke-width='8' opacity='0.5' fill='none'>
  <line x1='0' y1='1240' x2='4096' y2='1240'/>
  <line x1='0' y1='1280' x2='4096' y2='1280'/>
  <line x1='0' y1='1320' x2='4096' y2='1320'/>
</g>
<!-- Baseboard / kickplate steel -->
<rect y='1382' width='4096' height='26' fill='#5a6870'/>
<rect y='1380' width='4096' height='4' fill='#8ab0c8' opacity='0.5'/>
<!-- FLOOR y=1400-2048 -->
<rect y='1400' width='4096' height='648' fill='url(#floorG)'/>
<rect y='1400' width='4096' height='648' fill='url(#floorGrid)' opacity='0.88'/>
<!-- Floor light reflections from fluorescents -->
<g fill='#e8f4ff' opacity='0.06'>
  <ellipse cx='256' cy='1500' rx='200' ry='80'/>
  <ellipse cx='1280' cy='1500' rx='200' ry='80'/>
  <ellipse cx='2304' cy='1500' rx='200' ry='80'/>
  <ellipse cx='3328' cy='1500' rx='200' ry='80'/>
</g>
<!-- Floor depth vignette -->
<rect y='1850' width='4096' height='198' fill='#2a3038' opacity='0.5'/>
</svg>
