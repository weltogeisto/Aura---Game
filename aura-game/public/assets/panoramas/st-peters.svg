  <rect x='2480' y='640' width='75' height='760' fill='url(#colG)'/><rect x='2568' y='640' width='75' height='760' fill='url(#colG)' opacity='0.85'/>
  <rect x='2960' y='640' width='75' height='760' fill='url(#colG)'/><rect x='3048' y='640' width='75' height='760' fill='url(#colG)' opacity='0.85'/>
  <rect x='3440' y='640' width='75' height='760' fill='url(#colG)'/><rect x='3528' y='640' width='75' height='760' fill='url(#colG)' opacity='0.85'/>
  <rect x='3820' y='640' width='75' height='760' fill='url(#colG)'/><rect x='3908' y='640' width='75' height='760' fill='url(#colG)' opacity='0.85'/>
