<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 4096 2048'>
<defs>
  <linearGradient id='domeG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#1a1510'/>
    <stop offset='0.25' stop-color='#3a3028'/>
    <stop offset='0.6' stop-color='#c8a030'/>
    <stop offset='1' stop-color='#e8dcc8'/>
  </linearGradient>
  <linearGradient id='wallG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#d0c8b8'/>
    <stop offset='1' stop-color='#908070'/>
  </linearGradient>
  <linearGradient id='floorG' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0' stop-color='#ccc4b4'/>
    <stop offset='1' stop-color='#40382c'/>
  </linearGradient>
  <linearGradient id='colG' x1='0' y1='0' x2='1' y2='0'>
    <stop offset='0' stop-color='#c8c0b0'/>
    <stop offset='0.3' stop-color='#f0ece4'/>
    <stop offset='0.7' stop-color='#e0d8c8'/>
    <stop offset='1' stop-color='#a09080'/>
  </linearGradient>
  <radialGradient id='domeLight' cx='50%' cy='20%' r='45%'>
    <stop offset='0' stop-color='#fff8d0' stop-opacity='0.5'/>
    <stop offset='0.5' stop-color='#c8a030' stop-opacity='0.2'/>
    <stop offset='1' stop-color='#3a3028' stop-opacity='0'/>
  </radialGradient>
  <pattern id='mosaicTop' x='0' y='0' width='40' height='40' patternUnits='userSpaceOnUse'>
    <rect width='40' height='40' fill='#c8a030'/>
    <rect x='2' y='2' width='16' height='16' fill='#e8c860' opacity='0.8'/>
    <rect x='22' y='2' width='16' height='16' fill='#b89020' opacity='0.8'/>
    <rect x='2' y='22' width='16' height='16' fill='#d4b040' opacity='0.8'/>
    <rect x='22' y='22' width='16' height='16' fill='#f0d870' opacity='0.8'/>
  </pattern>
  <pattern id='vaultCoffer' x='0' y='0' width='320' height='200' patternUnits='userSpaceOnUse'>
    <rect width='320' height='200' fill='#a88820'/>
    <rect x='8' y='8' width='304' height='184' fill='#c8a840' rx='6'/>
    <rect x='20' y='20' width='280' height='160' fill='#b89830' rx='4'/>
    <circle cx='160' cy='100' r='28' fill='#e8c860' opacity='0.65'/>
    <circle cx='160' cy='100' r='14' fill='#fff8d0' opacity='0.5'/>
  </pattern>
  <pattern id='marbFloor' x='0' y='0' width='240' height='240' patternUnits='userSpaceOnUse'>
    <rect width='240' height='240' fill='#b8b0a0'/>
    <rect x='0' y='0' width='120' height='120' fill='#ccc4b4'/>
    <rect x='120' y='120' width='120' height='120' fill='#ccc4b4'/>
    <rect x='0' y='0' width='120' height='120' fill='none' stroke='#9a8870' stroke-width='2'/>
    <rect x='120' y='0' width='120' height='120' fill='none' stroke='#9a8870' stroke-width='2'/>
    <rect x='0' y='120' width='120' height='120' fill='none' stroke='#9a8870' stroke-width='2'/>
    <rect x='120' y='120' width='120' height='120' fill='none' stroke='#9a8870' stroke-width='2'/>
    <polygon points='120,40 140,120 120,200 100,120' fill='none' stroke='#c8a030' stroke-width='2' opacity='0.6'/>
    <polygon points='40,120 120,100 200,120 120,140' fill='none' stroke='#c8a030' stroke-width='2' opacity='0.6'/>
  </pattern>
</defs>
<!-- CEILING / DOME y=0-580 -->
<rect width='4096' height='580' fill='url(#domeG)'/>
<!-- Gold mosaic band at very top -->
<rect y='0' width='4096' height='110' fill='url(#mosaicTop)' opacity='0.9'/>
<rect y='0' width='4096' height='110' fill='url(#domeLight)'/>
<!-- Barrel vault coffering below mosaic -->
<rect y='110' width='4096' height='450' fill='url(#vaultCoffer)' opacity='0.75'/>
<!-- Dome lantern glow -->
<ellipse cx='2048' cy='55' rx='500' ry='55' fill='#fff8e0' opacity='0.22'/>
<ellipse cx='2048' cy='55' rx='200' ry='30' fill='#fffad0' opacity='0.3'/>
<!-- CORNICE y=555-645 -->
<rect y='548' width='4096' height='100' fill='#9a8870'/>
