  <path d='M0 950 q400 30 800 -20 q400 -45 800 30 q400 40 800 -15 q400 -35 800 25 q400 35 296 -10'/>
  <path d='M0 1150 q500 -30 1000 40 q500 50 1000 -20 q500 -40 1000 30 q500 40 96 -15'/>
</g>
